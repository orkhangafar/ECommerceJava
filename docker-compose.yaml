version: '3.8'

services:
  # 1. VERİLƏNLƏR BAZASI (POSTGRESQL)
  db:
    image: postgres:16-alpine
    container_name: ecomm-postgres
    environment:
      POSTGRES_DB: ecomm_db
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ecomm-network

  # 2. BACKEND (SPRING BOOT)
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ecomm-backend
    ports:
      - "8080:8080"
    depends_on:
      - db
    networks:
      - ecomm-network
    environment:

      DB_URL: jdbc:postgresql://db:5432/ecomm_db?sslmode=disable
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD}

      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ACCESS_EXP: ${JWT_ACCESS_EXP:-900000}
      JWT_REFRESH_EXP: ${JWT_REFRESH_EXP:-604800000}

      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}

      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}

      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}

      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}

volumes:
  postgres_data:

networks:
  ecomm-network:
    driver: bridge